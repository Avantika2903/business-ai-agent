name: PR Automation

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  issues: write
  pull-requests: write

jobs:
  pr-comment:
    runs-on: ubuntu-latest

    steps:
      - name: Comment and label PR
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "Thanks for opening this PR!

          I will review it soon and attach the appropriate labels.

          Meanwhile, please make sure:
          - All tests are passing
          - Code is properly formatted

          Thanks again!
          Mohit Kumhar
          Maintainer"

          gh label create "needs-review" \
            --repo "$REPO" \
            --color "fbca04" \
            --description "PR awaits maintainer review" \
            --force || true

          gh pr edit "$PR_NUMBER" \
            --repo "$REPO" \
            --add-label "needs-review"
